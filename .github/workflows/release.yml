name: Release

# Cut a release by pushing a tag: git tag v0.1.0 && git push origin v0.1.0
# This builds the clean installer zip and attaches it to a GitHub Release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so package.sh can read the tag via git describe

      - name: Build installer zip
        run: |
          chmod +x scripts/package.sh
          scripts/package.sh "${GITHUB_REF_NAME}"

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/gruntwork-travel-skills-${GITHUB_REF_NAME}.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
